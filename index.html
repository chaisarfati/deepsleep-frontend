<!-- index.html -->
<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>DeepSleep — FinOps Control Plane</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <a class="skip-link" href="#app">Aller au contenu</a>

  <div class="shell">
    <!-- Left rail -->
    <aside class="rail" aria-label="Navigation principale">
      <div class="rail__brand">
        <div class="brand__mark" aria-hidden="true">
          <!-- Simple square mark -->
          <svg width="20" height="20" viewBox="0 0 20 20" role="img" aria-label="Logo">
            <rect x="2" y="2" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"></rect>
            <path d="M6 10h8" stroke="currentColor" stroke-width="2"></path>
          </svg>
        </div>
        <div class="brand__text">
          <div class="brand__name">DeepSleep</div>
          <div class="brand__tag">AWS FinOps • EKS/RDS</div>
        </div>
      </div>

      <nav class="rail__nav">
        <a class="navlink" href="#/discovery" data-route="discovery">
          <span class="navlink__icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 18 18">
              <path d="M2 7h14M2 11h14M4 3h10M4 15h10" fill="none" stroke="currentColor" stroke-width="1.7"/>
            </svg>
          </span>
          <span class="navlink__label">Discovery</span>
        </a>

        <a class="navlink" href="#/active" data-route="active">
          <span class="navlink__icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 18 18">
              <path d="M4 14V4h10v10H4Z" fill="none" stroke="currentColor" stroke-width="1.7"/>
              <path d="M6 6h6M6 9h6M6 12h4" fill="none" stroke="currentColor" stroke-width="1.7"/>
            </svg>
          </span>
          <span class="navlink__label">Active Resources</span>
        </a>

        <a class="navlink" href="#/policies" data-route="policies">
          <span class="navlink__icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 18 18">
              <path d="M3 4h12v10H3V4Z" fill="none" stroke="currentColor" stroke-width="1.7"/>
              <path d="M5 7h8M5 10h6" fill="none" stroke="currentColor" stroke-width="1.7"/>
            </svg>
          </span>
          <span class="navlink__label">Time Policies</span>
        </a>

        <a class="navlink" href="#/settings" data-route="settings">
          <span class="navlink__icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 18 18">
              <path d="M9 11.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" fill="none" stroke="currentColor" stroke-width="1.7"/>
              <path d="M3 9l1.6-.6.2-1.8L3.7 5.3 5.3 3.7l1.3 1.1 1.8-.2L9 3l.6 1.6 1.8.2 1.3-1.1 1.6 1.6-1.1 1.3.2 1.8L15 9l-1.6.6-.2 1.8 1.1 1.3-1.6 1.6-1.3-1.1-1.8.2L9 15l-.6-1.6-1.8-.2-1.3 1.1-1.6-1.6 1.1-1.3-.2-1.8L3 9Z" fill="none" stroke="currentColor" stroke-width="1.3"/>
            </svg>
          </span>
          <span class="navlink__label">Settings</span>
        </a>
      </nav>

      <div class="rail__foot">
        <div class="foot__hint">
          <span class="hint__label">Polling:</span>
          <span class="hint__value" id="polling-indicator">10s</span>
        </div>
        <div class="foot__hint">
          <span class="hint__label">API:</span>
          <span class="hint__value" id="api-indicator">—</span>
        </div>
      </div>
    </aside>

    <!-- Main column -->
    <main class="main" id="app">
      <!-- Sticky header -->
      <header class="topbar" role="banner">
        <div class="topbar__left">
          <div class="crumbs" id="crumbs">DeepSleep</div>
        </div>

        <div class="topbar__center">
          <label class="search" aria-label="Recherche">
            <span class="search__icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 18 18">
                <circle cx="8" cy="8" r="5" fill="none" stroke="currentColor" stroke-width="1.7"/>
                <path d="M12.5 12.5L16 16" fill="none" stroke="currentColor" stroke-width="1.7"/>
              </svg>
            </span>
            <input id="global-search" class="search__input" type="search" placeholder="Filter resources by name / region / type…" autocomplete="off" />
          </label>
        </div>

        <div class="topbar__right">
          <button class="userchip" id="userchip" type="button" aria-haspopup="menu" aria-expanded="false">
            <span class="userchip__dot" aria-hidden="true"></span>
            <span class="userchip__text" id="userchip-text">User</span>
            <span class="userchip__caret" aria-hidden="true">
              <svg width="14" height="14" viewBox="0 0 14 14">
                <path d="M3 5l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.7"/>
              </svg>
            </span>
          </button>

          <div class="dropdown" id="user-dropdown" role="menu" aria-label="Profil" hidden>
            <div class="dropdown__row">
              <div class="dropdown__k">Name</div>
              <div class="dropdown__v" id="dd-name">—</div>
            </div>
            <div class="dropdown__row">
              <div class="dropdown__k">AWS Account</div>
              <div class="dropdown__v" id="dd-aws">—</div>
            </div>
            <div class="dropdown__row">
              <div class="dropdown__k">Business ID</div>
              <div class="dropdown__v" id="dd-biz">—</div>
            </div>
            <div class="dropdown__sep" aria-hidden="true"></div>
            <div class="dropdown__row">
              <button class="btn btn--ghost" id="logout-btn" type="button">Logout</button>
            </div>
          </div>
        </div>
      </header>

      <!-- Toast + modal portal -->
      <div class="toaststack" id="toaststack" aria-live="polite" aria-relevant="additions"></div>
      <div class="modalhost" id="modalhost"></div>

      <!-- Routed content -->
      <section class="page" id="page"></section>
    </main>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
